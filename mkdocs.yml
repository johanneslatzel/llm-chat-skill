site_name: LLM Chat Skill
site_url: https://johanneslatzel.github.io/llm-chat-skill/
repo_url: https://github.com/johanneslatzel/llm-chat-skill
theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
plugins:
  - search
